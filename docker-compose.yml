name: stac-higher

services:
  database:
    image: ghcr.io/stac-utils/pgstac:latest
    environment:
      - POSTGRES_USER=username
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=postgis
      - PGUSER=username
      - PGPASSWORD=password
      - PGDATABASE=postgis
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "username", "-d", "postgis"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    image: ghcr.io/stac-utils/stac-fastapi-pgstac:latest
    environment:
      - APP_HOST=0.0.0.0
      - APP_PORT=8082
      - ENVIRONMENT=local
      - PGUSER=username
      - PGPASSWORD=password
      - PGDATABASE=postgis
      - PGHOST=database
      - PGPORT=5432
      - WEB_CONCURRENCY=1
      - ENABLE_TRANSACTIONS_EXTENSIONS=TRUE
    ports:
      - "8082:8082"
    depends_on:
      database:
        condition: service_healthy
    command: >
      bash -c "
      uvicorn stac_fastapi.pgstac.app:app --host 0.0.0.0 --port 8082 --proxy-headers --forwarded-allow-ips=*
      "
    healthcheck:
      # Image ships no curl/wget; use the bundled Python against the
      # stac-fastapi liveness endpoint.
      test:
        - CMD-SHELL
        - python -c 'import urllib.request; urllib.request.urlopen("http://127.0.0.1:8082/_mgmt/ping")'
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # STAC API auth gateway (github.com/developmentseed/stac-auth-proxy).
  # Default mode is pass-through: DEFAULT_PUBLIC=true plus an empty
  # PRIVATE_ENDPOINTS map makes every route (reads AND transactions) reachable
  # without a token, so existing dev/e2e flows need no login. Phase 1
  # enforcement is opt-in via a compose override that restores transaction
  # protection and audience validation (reads stay public):
  #   docker compose -f docker-compose.yml -f infra/compose.auth-enforced.yml up -d --wait
  # See docs/decisions/0002-auth-proxy-enforcement.md.
  auth-proxy:
    image: ghcr.io/developmentseed/stac-auth-proxy:latest
    environment:
      - UPSTREAM_URL=http://api:8082
      # Public discovery URL (issuer as browser clients see it) vs. the
      # in-network URL the proxy uses to actually fetch metadata/JWKS.
      - OIDC_DISCOVERY_URL=http://localhost:8180/realms/stac-higher/.well-known/openid-configuration
      - OIDC_DISCOVERY_INTERNAL_URL=http://keycloak:8080/realms/stac-higher/.well-known/openid-configuration
      - DEFAULT_PUBLIC=true
      - PRIVATE_ENDPOINTS={}
    ports:
      # The container listens on 8000 (fixed by the image); host port is 8081.
      - "8081:8000"
    depends_on:
      api:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - python -c 'import urllib.request; urllib.request.urlopen("http://127.0.0.1:8000/healthz")'
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  keycloak:
    image: quay.io/keycloak/keycloak:26.3
    command: start-dev --import-realm
    environment:
      - KC_BOOTSTRAP_ADMIN_USERNAME=admin
      - KC_BOOTSTRAP_ADMIN_PASSWORD=admin
      # Exposes /health/* on the management interface (container port 9000,
      # not published to the host — no clash with MinIO's host :9000).
      - KC_HEALTH_ENABLED=true
    ports:
      # Host 8180 (container 8080): 8080 is chronically contested on dev
      # machines (editors, other stacks); Keycloak stays 8080 in-network.
      - "8180:8080"
    volumes:
      # Persist the dev-mode data dir (H2 database) so realm state survives
      # restarts. --import-realm skips realms that already exist. Mounted at
      # /opt/keycloak/data (exists in the image, owned by uid 1000) rather
      # than .../data/h2 (doesn't exist → volume would be created root-owned
      # and Keycloak couldn't write its H2 files).
      - keycloak-data:/opt/keycloak/data
      - ./infra/keycloak:/opt/keycloak/data/import:ro
    healthcheck:
      # No curl/wget in the image; use bash's /dev/tcp against the management
      # port's readiness endpoint.
      test:
        - CMD-SHELL
        - >-
          exec 3<>/dev/tcp/127.0.0.1/9000 &&
          echo -e 'GET /health/ready HTTP/1.1\r\nHost: 127.0.0.1\r\nConnection: close\r\n\r\n' >&3 &&
          grep -q '200 OK' <&3
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      # `local` is the alias mc auto-resolves inside the server container.
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # One-shot bootstrap: creates the default bucket, then exits.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/stac-higher
    restart: "no"

  # Data plane (ROADMAP §3). Source lives in services/pipeline (separate
  # workstream); this entry assumes services/pipeline/Dockerfile.
  pipeline:
    build: ./services/pipeline
    environment:
      - DATABASE_URL=postgresql://username:password@database:5432/postgis
      - HEALTH_PORT=8083
      # Same master key the app uses to seal credentials (docs/connections.md).
      # The pipeline decrypts connection credentials with it; the drain/health
      # jobs fail their tick loudly if it is unset.
      - CREDENTIALS_MASTER_KEY=${CREDENTIALS_MASTER_KEY:-}
      # Egress allowlist: hosts the SSRF guard permits even when they resolve to
      # private/compose-internal addresses. Defaults cover the throwaway test
      # servers (infra/compose.test-servers.yml) and MinIO.
      - EGRESS_ALLOW_HOSTS=${EGRESS_ALLOW_HOSTS:-minio,sftp-test,ftp-test,ftps-test}
      # Platform object storage (Phase 3): the staging TTL sweep targets the
      # compose MinIO bucket. minio is in EGRESS_ALLOW_HOSTS so the pinned-egress
      # check keeps the compose-internal hostname.
      - STAGING_S3_ENDPOINT=${STAGING_S3_ENDPOINT:-http://minio:9000}
      - STAGING_S3_ACCESS_KEY_ID=${STAGING_S3_ACCESS_KEY_ID:-minioadmin}
      - STAGING_S3_SECRET_ACCESS_KEY=${STAGING_S3_SECRET_ACCESS_KEY:-minioadmin}
      - STAGING_BUCKET=${STAGING_BUCKET:-stac-higher}
      - STAGING_TTL_SECONDS=${STAGING_TTL_SECONDS:-86400}
    ports:
      - "8083:8083"
    depends_on:
      database:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - python -c 'import urllib.request; urllib.request.urlopen("http://127.0.0.1:8083/health")'
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  pgdata:
  keycloak-data:
  minio-data:
